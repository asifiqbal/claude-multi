name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Make scripts executable
        run: chmod +x install.sh bin/cc-launch.sh test/*.sh
      - name: Run all tests
        run: bash test/run-all.sh
